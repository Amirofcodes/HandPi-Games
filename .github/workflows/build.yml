name: Build & Deploy Portfolio SPA

on:
  push:
    branches:
      - docs/portfolio-spa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          echo "tag=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push SPA image
        uses: docker/build-push-action@v5
        with:
          context: docs/portfolio-spa
          file: docs/portfolio-spa/Dockerfile
          push: true
          tags: |
            ghcr.io/amirofcodes/handpi-portfolio-spa:${{ steps.tag.outputs.tag }}
            ghcr.io/amirofcodes/handpi-portfolio-spa:latest

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/docs/portfolio-spa'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update SPA image tag in portfolio-deploy.yaml
        run: |
          TAG=${{ needs.build-and-push.outputs.tag }}
          # Replace the image line in deploy/portfolio-deploy.yaml
          sed -i "s|ghcr.io/amirofcodes/handpi-portfolio-spa:[^[:space:]]*|ghcr.io/amirofcodes/handpi-portfolio-spa:${TAG}|" deploy/portfolio-deploy.yaml
          echo "Updated portfolio-deploy.yaml with tag ${TAG}"

      - name: Commit & push updated manifest
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add deploy/portfolio-deploy.yaml
          git commit -m "ci: bump portfolio-spa image to $TAG" || echo "No changes to commit"
          git push
