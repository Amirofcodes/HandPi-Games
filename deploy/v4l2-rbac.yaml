apiVersion: v1
kind: ServiceAccount
metadata:
  name: v4l2-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: v4l2-device-plugin
rules: [] # plugin doesn't call the API
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: v4l2-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: v4l2-device-plugin
subjects:
  - kind: ServiceAccount
    name: v4l2-device-plugin
    namespace: kube-system
